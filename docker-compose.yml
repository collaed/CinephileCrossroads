services:
  cinecross:
    build: .
    container_name: cinecross
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - TMDB_KEY=          # themoviedb.org API key
      - OMDB_KEY=          # omdbapi.com API key
      - TVDB_KEY=          # thetvdb.com API key
      - TRAKT_ID=          # Trakt OAuth client ID
      - TRAKT_SECRET=      # Trakt OAuth client secret
      - TRAKT_REDIRECT=https://your-domain.com/cinecross/trakt/callback
      - WATCH_COUNTRY=US   # ISO 3166-1 country code
      # Agent mode: set to run agent alongside server
      # - AGENT_MODE=1
      # - AGENT_USER=yourname
    volumes:
      - data:/data

volumes:
  data:

